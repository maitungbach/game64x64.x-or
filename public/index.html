<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dang nhap / Dang ky - Game 64x64</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-panel">
      <a class="back-link" href="/game.html">Vao game</a>
      <h1>Tai khoan Game 64x64</h1>
      <p class="subtitle">Dang nhap hoac tao tai khoan de luu ten nguoi choi tren trinh duyet nay.</p>

      <div class="auth-tabs" role="tablist" aria-label="Che do xac thuc">
        <button id="tabLogin" type="button" class="tab is-active" data-mode="login">Dang nhap</button>
        <button id="tabRegister" type="button" class="tab" data-mode="register">Dang ky</button>
      </div>

      <form id="loginForm" class="auth-form">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" name="email" type="email" autocomplete="email" required />

        <label for="loginPassword">Mat khau</label>
        <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />

        <button type="submit" class="primary-btn">Dang nhap va vao game</button>
      </form>

      <form id="registerForm" class="auth-form is-hidden" novalidate>
        <label for="registerName">Ten hien thi</label>
        <input id="registerName" name="name" type="text" minlength="2" maxlength="24" required />

        <label for="registerEmail">Email</label>
        <input id="registerEmail" name="email" type="email" autocomplete="email" required />

        <label for="registerPassword">Mat khau</label>
        <input id="registerPassword" name="password" type="password" minlength="6" autocomplete="new-password" required />

        <label for="registerConfirm">Nhap lai mat khau</label>
        <input id="registerConfirm" name="confirmPassword" type="password" minlength="6" autocomplete="new-password" required />

        <button type="submit" class="primary-btn">Tao tai khoan</button>
      </form>

      <p id="authMessage" class="message" aria-live="polite"></p>
      <p class="note">Dang nhap dang duoc xu ly boi backend. Moi tai khoan chi dang nhap duoc 1 phien tai mot thoi diem.</p>

      <section class="test-accounts" aria-label="Tai khoan mau">
        <h2>5 tai khoan test</h2>
        <ul id="seedList"></ul>
      </section>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
